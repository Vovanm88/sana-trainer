model:
  pretrained_model: Efficient-Large-Model/Sana_1600M_1024px_BF16_diffusers
  variant: bf16
data:
  factory: fm_train.example_dataset:build_supups_dataset_3tier
  factory_args:
    root: /workspace/supups/dataset_v1
    split: train
    validation_fraction: 0.01
    split_seed: 42
    min_max_score: 0.75
    include_bad_pool: false
    prefer: short
    caption_seed: 43
    decode_size: 2048
    p_very_short: 0.4
    p_short: 0.35
    p_long: 0.25
  validation_factory_args:
    root: /workspace/supups/dataset_v1
    split: validation
    validation_fraction: 0.01
    split_seed: 42
    min_max_score: 0.75
    include_bad_pool: false
    prefer: short
    caption_seed: 43
    decode_size: 2048
    p_very_short: 0.4
    p_short: 0.35
    p_long: 0.25
  resolution: 1024
  batch_size: 8
  num_workers: 4
  prompt_dropout: 0.15
cache: {mode: online, directory: /workspace/supups/dataset_v1/fm-cache-sft, producer_device: "cuda:0", queue_size: 256, batch_size: 12, prepare_workers: 4, online_max_entries: 1024}
training:
  profile: sft
  output_dir: /workspace/supups/fmtrain/outputs/supups-v1-sft
  max_steps: 5000
  gradient_accumulation_steps: 4
  mixed_precision: bf16
  seed: 42
  max_grad_norm: 1.0
  loss_scale: 64.0
  resume_from: /workspace/supups/fmtrain/outputs/supups-v1-sft/checkpoint-1500
  resume_global_step: false
objective: {name: flow, scheduler: z_image, shift: 3.0, num_train_timesteps: 1000, weighting: none, t_sampling_bias: 4.0}
optimizer: {name: adamw, learning_rate: 5.0e-6, weight_decay: 0.01}
lr: {warmup_ratio: 0.05, cooldown_ratio: 0.1, plateau_factor: 0.5, plateau_patience: 1}
deepspeed: {stage: 2, config_file: accelerate/zero2.yaml}
validation: {enabled: true, every_steps: 100, batches: 8, seed: 1234}
sampling:
  enabled: true
  every_steps: 50
  prompts: ["a highly detailed photograph with crisp natural textures", "The image depicts an anime-style character with light blue hair and purple eyes, wearing a dark blue bikini, captured in a dynamic pose as if jumping mid-air. The character is set against a plain white background, emphasizing the vibrant colors and detailed artwork. The style is clean and modem, typical of contemporary anime illustrations, with smooth lines and soft shading that highlights the character's form.", "girl without closes with big boobs and ass",  "a man in a racing suit and cap", "Five children, dressed in school uniforms, stand in a line on the steps in front of a large, ornate cathedral with two tall spires and intricate architectural details.", "a cinematic portrait with natural skin texture"]
  num_inference_steps: 30
  guidance_scale: 4.5
  seed: 1234
checkpointing: {enabled: true, every_steps: 500, keep_last: 5, milestone_steps: [1000, 2500, 5000,]}
trackio: {enabled: true, project: sana-fm-sft-v1}
